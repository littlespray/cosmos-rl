redis = "12800"

[train]
resume = false
epoch = 20
output_dir = "./outputs/qwen3-8b-babyvision-grpo"
epsilon = 1e-6
optm_name = "AdamW"
optm_lr = 1e-6
optm_impl = "fused"
optm_weight_decay = 0.0
optm_betas = [ 0.9, 0.999,]
optm_warmup_steps = 20
optm_grad_norm_clip = 1.0
async_tp_enabled = false
compile = false
param_dtype = "bfloat16"
fsdp_reduce_dtype = "float32"
fsdp_offload = false
fsdp_reshard_after_forward = "default"
train_batch_per_replica = 128
sync_weight_interval = 1

[rollout]
gpu_memory_utilization = 0.95
enable_chunked_prefill = false
n_generation = 16
batch_size = 4
quantization = "none"
seed = 42

[policy]
model_name_or_path = "Qwen/Qwen3-VL-8B-Thinking"
model_max_length = 16384
model_gradient_checkpointing = true

[logging]
logger = ['console', 'wandb']
project_name = "babyvision-rl"
experiment_name = "qwen3-8b-babyvision-grpo"

[train.train_policy]
type = "grpo"
variant = "dapo"
filter_reward_metric = "boxed_math"
dataset.name = "yufhuang/babyvision"
dataset.subset = "main"
dataset.split = "train"
prompt_column_name = "question"
response_column_name = "answer"
reward_function = "boxed_math"
temperature = 1.0
epsilon_low = 0.2
epsilon_high = 0.28
lower_bound_ratio = 10.0
kl_beta = 0.0
mu_iterations = 1
mini_batch = 8
min_filter_prefix_tokens = 1

[validation]
enable = false
freq = 50
temperature = 0.0
max_response_length = 16384
dataset.name = "yufhuang/babyvision"
dataset.subset = "main"
dataset.split = "test"

[train.ckpt]
enable_checkpoint = true
save_freq = 50
save_mode = "async"
max_keep = 5
export_safetensors = true
upload_hf = true
hf_repo_name = "shangkuns/qwen3-8b-babyvision-grpo"

[rollout.parallelism]
n_init_replicas = 1
tp_size = 2
pp_size = 1


[policy.parallelism]
n_init_replicas = 1
tp_size = 1
cp_size = 1
dp_shard_size = 8
pp_size = 1
dp_replicate_size = 1
